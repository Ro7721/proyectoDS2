<div class="max-w-6xl mx-auto space-y-8 pb-10">
    <div class="flex items-center justify-between">
        <h2 class="text-3xl font-bold text-gray-800">Bievenido</h2>
        <button
            class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50">
            <lucide-icon name="plus" [size]="20"></lucide-icon>
        </button>
    </div>

    <!-- Hero Cards -->
    <div class="grid md:grid-cols-2 gap-6">
        <div
            class="relative bg-gradient-to-br from-[#68B187] to-[#3A9E5F] rounded-2xl p-8 h-64 overflow-hidden text-white flex flex-col justify-center">
            <!-- decorative elements -->
            <div class="absolute inset-0 opacity-20 pointer-events-none"
                style="background: radial-gradient(circle at 0% 0%, rgba(255,255,255,0.4) 0%, transparent 50%);"></div>

            <div class="relative z-10 w-3/4">
                <h3 class="text-3xl font-semibold mb-4 text-white">Bievenido!</h3>
                <p class="text-[13px] text-white/90 leading-relaxed font-light">
                    Empieza a aprender lo que siempre quisiste.
                </p>
            </div>

            <button
                class="absolute bottom-6 right-6 w-14 h-14 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center border border-white/40 hover:bg-white/30 transition-all group">
                <lucide-icon name="play" class="ml-1 text-white opacity-80 group-hover:opacity-100"
                    [size]="24"></lucide-icon>
            </button>
        </div>

        <div
            class="relative bg-gradient-to-tr from-[#55C3A5] via-[#7EE7CB] to-[#C4F6E9] rounded-2xl p-8 h-64 overflow-hidden flex flex-col justify-center shadow-sm">
            <!-- abstract green shapes -->
            <div class="absolute inset-0 pointer-events-none"
                style="background: radial-gradient(circle at 100% 100%, rgba(58,158,95,0.2) 0%, transparent 60%);">
            </div>

            <div class="relative z-10 w-2/3 mt-auto mb-6">
                <h3 class="text-2xl font-medium text-white mix-blend-difference mb-3">learning:</h3>
            </div>

            <button
                class="absolute bottom-6 right-6 w-10 h-10 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center text-white/90 border border-white/30 hover:bg-white/40 transition">
                <lucide-icon name="chevron-right" [size]="20"></lucide-icon>
            </button>
        </div>
    </div>

    <!-- Course Cards -->
    <div class="mt-10">
        <h3 class="text-xl font-bold text-gray-800 mb-6">Cursos</h3>
        <div class="grid md:grid-cols-2 gap-5">
            <div *ngFor="let course of courses"
                class="bg-white rounded-[20px] p-5 border border-gray-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] flex items-center gap-5 hover:shadow-md transition">
                <!-- Circular Progress Ring -->
                <div class="relative w-16 h-16 flex items-center justify-center shrink-0">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <path class="text-gray-100" stroke-width="3" stroke="currentColor" fill="none"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path [attr.stroke]="course.color" stroke-width="3" stroke-dasharray="100, 100"
                            [attr.stroke-dashoffset]="100 - course.progress" fill="none"
                            class="transition-all duration-1000 ease-out"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <span class="absolute text-[13px] font-bold text-gray-700">{{course.progress}}%</span>
                </div>

                <div>
                    <span class="text-[9px] text-gray-400 font-bold tracking-wider uppercase mb-1 block">PROGRESS</span>
                    <h4 class="text-[17px] font-bold text-gray-800">{{course.title}}</h4>
                    <p class="text-[13px] text-gray-500 mt-1 flex items-center gap-1.5 leading-snug">
                        <span class="w-3 h-3 rounded-full border-[3px] border-orange-400 shrink-0"></span>
                        <span class="line-clamp-1">{{course.subtitle}}</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
