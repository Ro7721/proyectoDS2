<p-toast position="top-right" [life]="3000" />

<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex">

    <!-- Backdrop móvil -->
    <div *ngIf="!isSidebarCollapsed && isMobile"
        class="fixed inset-0 bg-black/40 backdrop-blur-sm z-30 lg:hidden transition-opacity duration-300"
        (click)="isSidebarCollapsed = true">
    </div>

    <!-- Sidebar -->
    <app-sidebar [menu]="menu" [role]="role" [isCollapsed]="isMobile? isSidebarCollapsed : false"
        (onExpand)="isSidebarCollapsed = false"
        class="h-screen sticky top-0 z-40 flex-shrink-0 transition-all duration-300 ease-in-out">
    </app-sidebar>

    <!-- Contenido principal -->
    <div class="flex-1 flex flex-col min-w-0">
        <app-header [title]="pageTitle" [userName]="userName" (menuToggle)="toggleSidebar()" />
        <main class="flex-1 p-4 md:p-6 lg:p-8 overflow-auto">
            <router-outlet></router-outlet>
        </main>
        <app-footer />
    </div>
</div>
