<p-toast position="top-right" [pt]="{
    summary: { class: 'text-[#3A9E5F]! font-bold' },
    detail: { class: 'text-black! font-medium' }
  }" />

<div class="min-h-screen bg-gray-50 flex">
    <!-- Desktop sidebar -->
    <app-sidebar [menu]="menu" [role]="role" class="hidden lg:flex" />
    <!-- Mobile sidebar con animación -->
    <div class="lg:hidden">
        <div class="fixed inset-0 bg-black/50 z-40 transition-opacity duration-300" [class.opacity-100]="mobileOpen"
            [class.opacity-0]="!mobileOpen" [class.pointer-events-none]="!mobileOpen" (click)="mobileOpen = false">
        </div>

        <div class="fixed left-0 top-0 h-full z-50 transform transition-transform duration-300 ease-in-out"
            [class.translate-x-0]="mobileOpen" [class.-translate-x-full]="!mobileOpen">
            <app-sidebar [menu]="menu" [role]="role" />
        </div>
    </div>

    <div class="flex-1 flex flex-col min-w-0">
        <app-header [title]="pageTitle" [userName]="userName" (menuToggle)="mobileOpen = true" />
        <main class="flex-1 p-6 lg:p-8 overflow-auto">
            <router-outlet></router-outlet>
        </main>
        <app-footer />
    </div>
</div>
