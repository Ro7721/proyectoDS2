<p-toast position="top-right" [life]="3000" />

<div class="h-[100dvh] bg-gradient-to-br from-gray-50 to-gray-100 flex overflow-hidden">

    <!-- Backdrop móvil -->
    <div *ngIf="!isSidebarCollapsed && isMobile"
        class="fixed inset-0 bg-black/40 backdrop-blur-sm z-30 lg:hidden transition-opacity duration-300"
        (click)="isSidebarCollapsed = true">
    </div>

    <!-- Sidebar -->
    <!-- Desktop: static flex item. Mobile: fixed overlay -->
    <app-sidebar [menu]="menu" [role]="role" 
        [isCollapsed]="isMobile ? false : isSidebarCollapsed"
        (onExpand)="isSidebarCollapsed = false"
        class="h-full z-40 flex-shrink-0 transition-transform duration-300 ease-in-out"
        [ngClass]="{
            'fixed top-0 left-0 bottom-0': isMobile,
            '-translate-x-full': isMobile && isSidebarCollapsed,
            'translate-x-0': isMobile && !isSidebarCollapsed,
            'relative': !isMobile
        }">
    </app-sidebar>

    <!-- Contenido principal -->
    <div class="flex-1 flex flex-col min-w-0 h-full relative">
        <app-header [title]="pageTitle" [userName]="userName" [role]="role" (menuToggle)="toggleSidebar()" />
        <main class="flex-1 p-4 md:p-6 lg:p-8 overflow-y-auto">
            <router-outlet></router-outlet>
        </main>
        <app-footer />
    </div>
</div>
