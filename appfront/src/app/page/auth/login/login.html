<div class="w-full max-w-xl px-6 sm:px-10 py-10">

    <!-- Navbar -->
    <div class="flex justify-center md:justify-end gap-6 sm:gap-8 text-sm mb-10 text-gray-700">
        <a routerLink="/" class="hover:text-green-500 transition">
            Inicio
        </a>

        <a routerLink="/auth/register" class="hover:text-green-500 transition">
            Registro
        </a>
    </div>

    <!-- Title -->
    <h1 class="text-4xl sm:text-5xl font-bold text-gray-800 mb-8 text-center md:text-left">
        Login
    </h1>

    <!-- Tabs -->
    <div class="flex gap-10 border-b border-gray-300 mb-8">
        <button class="pb-3 border-b-2 border-green-500 font-semibold text-gray-800">
            Login
        </button>

        <button routerLink="/register" class="pb-3 text-gray-500 hover:text-green-500 transition">
            Register
        </button>
    </div>

    <!-- Form -->
    <form class="space-y-5" (ngSubmit)="login()">

        <div>
            <label class="block mb-1.5 text-sm font-semibold text-gray-700">
                Email
            </label>

            <input type="email" [(ngModel)]="email" name="email" placeholder="Password"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition bg-white" />
        </div>

        <div>
            <label class="block mb-1.5 text-sm font-semibold text-gray-700">
                Password
            </label>

            <input type="password" [(ngModel)]="password" name="password" placeholder="Student: Teacher"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition bg-white" />
        </div>

        <button type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-semibold transition mt-2">
            Sign In
        </button>
    </form>

    <!-- Footer -->
    <div class="flex flex-col sm:flex-row items-center gap-5 sm:gap-8 mt-10 text-gray-600 text-sm">
        <button class="hover:text-green-500">
            Docente
        </button>

        <button class="hover:text-green-500">
            Registro Social
        </button>
    </div>

</div>
