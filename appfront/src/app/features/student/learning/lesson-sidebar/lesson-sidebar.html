<nav class="lesson-sidebar" aria-label="Contenido del curso">
    <h2 class="lesson-sidebar__title">Contenido del curso</h2>

    <ol class="lesson-sidebar__rail">
        @for (lesson of lessons; track trackByLesson($index, lesson); let i = $index) {
        <li class="lesson-sidebar__item" [class.lesson-sidebar__item--active]="isSelected(lesson)">
            <button type="button" class="lesson-sidebar__row" (click)="select(lesson)">
                <div class="lesson-sidebar__icon">
                    <span class="material-icons" [style.color]="progressColor(lesson)">
                        {{statusIcon(lesson)}}
                    </span>
                </div>
                <div class="lesson-sidebar__content">
                    <div class="lesson-sidebar__header">
                        <span class="lesson-sidebar__title">
                            {{lesson.lessonOrder}}. {{lesson.title}}
                        </span>
                        <span class="lesson-sidebar__time">
                            {{lesson.durationMinutes}} min
                        </span>
                    </div>
                    <div class="lesson-sidebar__status">{{statusLabel(lesson)}}</div>
                    <div class="lesson-sidebar__progress">
                        <div class="lesson-sidebar__progress-value" [style.width.%]="lesson.watchedPercentage"></div>
                    </div>
                </div>

            </button>
        </li>
        }
    </ol>
</nav>
