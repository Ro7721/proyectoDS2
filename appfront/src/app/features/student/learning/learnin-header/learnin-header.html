<header class="course-header">
    <div class="course-cover">
        <img [src]="course.coverImage" [alt]="course.title">
        <div class="overlay"></div>
        <div class="header-content">
            <span class="category">{{ course.categoryName }}</span>
            <h1>{{ course.title }}</h1>
            <div class="teacher">
                <div class="avatar">{{ teacherInitials }}</div>
                <div>
                    <small>Instructor</small>
                    <strong>{{ course.teacherFullName }}</strong>
                </div>
            </div>
        </div>
    </div>

    <div class="course-info">
        <div class="card">
            <span class="material-icons">menu_book</span>
            <div>
                <strong>{{ course.totalLessons }}</strong>
                <small>Lecciones</small>
            </div>
        </div>
        <div class="card">
            <span class="material-icons">trending_up</span>
            <div>
                <strong>{{ course.totalProgress }}%</strong>
                <small>Progreso</small>
            </div>
        </div>
        <div class="card">
            <span class="material-icons">history</span>
            <div>
                <strong>{{ course.lastAccess | date:'dd MMM yyyy'}}</strong>
                <small>{{ course.lastAccess | date:'HH:mm' }}</small>
            </div>
        </div>
    </div>
</header>
