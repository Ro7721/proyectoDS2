<div class="bg-white border border-gray-200 rounded-2xl px-6 py-5 shadow-sm">

  <div class="flex items-center justify-between gap-4 flex-wrap">

    <!-- Left: progress info -->
    <div class="flex items-center gap-4">
      <!-- Circle progress -->
      <div class="relative w-14 h-14 shrink-0">
        <svg class="w-14 h-14 -rotate-90" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="24" fill="none" stroke="#f3f4f6" stroke-width="5"/>
          <circle cx="28" cy="28" r="24" fill="none"
            [attr.stroke]="completed ? '#16a34a' : '#E8592B'"
            stroke-width="5"
            stroke-linecap="round"
            [attr.stroke-dasharray]="150.8"
            [attr.stroke-dashoffset]="150.8 * (1 - clampedProgress / 100)"
            class="transition-all duration-700"/>
        </svg>
        <div class="absolute inset-0 flex items-center justify-center">
          <span class="text-xs font-black" [class.text-emerald-600]="completed" [class.text-gray-800]="!completed">
            {{ clampedProgress }}%
          </span>
        </div>
      </div>

      <div>
        <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-0.5">Progreso del curso</p>
        <div class="flex items-center gap-2">
          <h3 class="text-2xl font-black text-gray-900">{{ clampedProgress }}%</h3>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-semibold"
                [class.bg-emerald-100]="completed"
                [class.text-emerald-700]="completed"
                [class.bg-orange-50]="!completed"
                [class.text-[#E8592B]]="!completed">
            <span class="material-icons text-[14px]">{{ completed ? 'workspace_premium' : 'play_circle' }}</span>
            {{ statusLabel }}
          </span>
        </div>
        <p class="text-xs text-gray-400 mt-0.5">
          {{ completed ? 'Curso finalizado 🎉' : (100 - clampedProgress) + '% restante' }}
        </p>
      </div>
    </div>

    <!-- Right: certificate button -->
    @if (completed) {
    <button (click)="onShowCertificate()"
      class="group flex items-center gap-2 rounded-xl bg-gradient-to-r from-amber-400 to-yellow-500 hover:from-amber-500 hover:to-yellow-600 text-white px-5 py-2.5 font-semibold text-sm shadow-md hover:shadow-lg transition-all duration-200 hover:-translate-y-0.5">
      <span class="material-icons text-base">workspace_premium</span>
      Ver certificado
      <span class="material-icons text-base group-hover:translate-x-0.5 transition-transform">arrow_forward</span>
    </button>
    }

  </div>

  <!-- Progress bar -->
  <div class="mt-4 h-2 bg-gray-100 rounded-full overflow-hidden">
    <div class="h-full rounded-full transition-all duration-700"
         [ngClass]="completed ? 'bg-gradient-to-r from-emerald-400 to-emerald-600' : 'bg-gradient-to-r from-orange-400 to-[#E8592B]'"
         [style.width.%]="clampedProgress">
    </div>
  </div>

</div>
