<div class="max-w-3xl mx-auto p-4 sm:p-6 lg:p-8">
  <!-- Header -->
  <div class="mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Mi Perfil</h1>
      <p class="mt-2 text-sm text-gray-500">Gestiona tu información personal y credenciales.</p>
    </div>
    <div class="h-16 w-16 rounded-full bg-gradient-to-tr from-[#E8592B] to-orange-400 flex items-center justify-center text-2xl font-bold text-white shadow-lg">
      {{ user?.firstName?.charAt(0) || '' }}{{ user?.surName?.charAt(0) || '' }}
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center p-12">
    <div class="w-8 h-8 border-4 border-[#E8592B] border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div *ngIf="!loading && user" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden transition-all">
    
    <!-- Alertas -->
    <div *ngIf="message" 
         class="px-6 py-4 border-l-4 text-sm font-medium transition-all"
         [ngClass]="isError ? 'bg-red-50 border-red-500 text-red-700' : 'bg-emerald-50 border-emerald-500 text-emerald-700'">
      {{ message }}
    </div>

    <form [formGroup]="form" (ngSubmit)="saveProfile()" class="p-6 sm:p-8 space-y-6">
      
      <!-- Personal Info Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-700">Nombres</label>
          <input type="text" formControlName="firstName" required
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 focus:bg-white focus:border-[#E8592B] focus:ring-2 focus:ring-[#E8592B]/20 transition-all outline-none"
            placeholder="Tus nombres">
        </div>
        
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-700">Apellidos</label>
          <input type="text" formControlName="surName" required
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 focus:bg-white focus:border-[#E8592B] focus:ring-2 focus:ring-[#E8592B]/20 transition-all outline-none"
            placeholder="Tus apellidos">
        </div>
      </div>

      <!-- Account Info -->
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-gray-700">Correo Electrónico</label>
        <div class="relative">
          <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">email</span>
          <input type="email" formControlName="email" required
            class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 focus:bg-white focus:border-[#E8592B] focus:ring-2 focus:ring-[#E8592B]/20 transition-all outline-none"
            placeholder="tu@correo.com">
        </div>
      </div>

      <!-- Password Update -->
      <div class="pt-6 mt-6 border-t border-gray-100">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">Cambiar Contraseña</h3>
        <p class="text-sm text-gray-500 mb-4">Deja este campo en blanco si no deseas cambiar tu contraseña actual.</p>
        
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-700">Nueva Contraseña</label>
          <div class="relative">
            <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
            <input type="password" formControlName="password"
              class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 focus:bg-white focus:border-[#E8592B] focus:ring-2 focus:ring-[#E8592B]/20 transition-all outline-none"
              placeholder="Min. 8 caracteres (A-Z, a-z, 0-9, @$!%*?&)">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="pt-6 mt-6 border-t border-gray-100 flex justify-end gap-4">
        <button type="button" (click)="loadProfile()"
          class="px-6 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 transition-colors">
          Descartar
        </button>
        <button type="submit" [disabled]="saving || form.invalid"
          class="px-6 py-2.5 rounded-xl bg-[#E8592B] text-white font-semibold hover:bg-orange-600 focus:ring-4 focus:ring-orange-500/30 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
          <div *ngIf="saving" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          {{ saving ? 'Guardando...' : 'Guardar Cambios' }}
        </button>
      </div>

    </form>
  </div>
</div>
