<div class="max-w-6xl mx-auto space-y-8 pb-10">

    <!-- Hero Header -->
    <div
        class="relative bg-gradient-to-br from-[#5035B2] to-[#2B0F7A] rounded-3xl p-10 h-72 overflow-hidden text-white shadow-xl">
        <!-- abstract geometric shapes -->
        <div class="absolute inset-0 opacity-10 pointer-events-none"
            style="background: radial-gradient(circle at 0% 0%, #ffffff 0%, transparent 50%);"></div>
        <div class="absolute inset-0 opacity-10 pointer-events-none"
            style="background: radial-gradient(circle at 100% 100%, #ffffff 0%, transparent 50%);"></div>
        <div class="absolute -right-10 -bottom-10 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
        <div class="absolute -left-10 -top-10 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>

        <div class="relative z-10 h-full flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-[13px] font-bold text-white/70 tracking-widest uppercase mb-1">Dashboard docente</p>
                    <h2 class="text-3xl md:text-4xl font-semibold mb-2">¡Bienvenido!</h2>
                    <p class="text-[14px] text-white/90 leading-relaxed font-light w-2/3">
                        Empieza a crear cursos que cambien vidas.
                    </p>
                </div>
                <button
                    class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-sm flex items-center justify-center border border-white/20 hover:bg-white/20 transition">
                    <lucide-icon name="plus" [size]="24"></lucide-icon>
                </button>
            </div>

            <div class="flex justify-end -mr-12 -mb-12">
                <!-- Placeholder for banner image -->
                <div class="w-80 h-80 bg-white/5 rounded-2xl border border-white/10 backdrop-blur-sm"></div>
            </div>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid md:grid-cols-3 gap-6">
        <div
            class="bg-white rounded-[20px] p-5 border border-gray-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] flex items-center gap-5 hover:shadow-md transition">
            <div class="w-12 h-12 rounded-2xl bg-[#5035B2] flex items-center justify-center text-white">
                <lucide-icon name="users" [size]="20"></lucide-icon>
            </div>
            <div>
                <span class="text-[9px] text-gray-400 font-bold tracking-wider uppercase mb-1 block">Total usuarios
                </span>
                <span class="text-2xl font-bold text-gray-800">5.734</span>
            </div>
        </div>

        <div
            class="bg-white rounded-[20px] p-5 border border-gray-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] flex items-center gap-5 hover:shadow-md transition">
            <div class="w-12 h-12 rounded-2xl bg-[#5035B2] flex items-center justify-center text-white">
                <lucide-icon name="dollar-sign" [size]="20"></lucide-icon>
            </div>
            <div>
                <span class="text-[9px] text-gray-400 font-bold tracking-wider uppercase mb-1 block">Ventas del mes
                </span>
                <span class="text-2xl font-bold text-gray-800">842,194</span>
            </div>
        </div>

        <div
            class="bg-white rounded-[20px] p-5 border border-gray-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] flex items-center gap-5 hover:shadow-md transition">
            <div class="w-12 h-12 rounded-2xl bg-[#5035B2] flex items-center justify-center text-white">
                <lucide-icon name="clock" [size]="20"></lucide-icon>
            </div>
            <div>
                <span class="text-[9px] text-gray-400 font-bold tracking-wider uppercase mb-1 block">Ingresos totales
                </span>
                <span class="text-2xl font-bold text-gray-800">$12,992</span>
            </div>
        </div>
    </div>

    <!-- Course Cards -->
    <div class="mt-10">
        <h3 class="text-xl font-bold text-gray-800 mb-6">Cursos</h3>
        <div class="grid md:grid-cols-2 gap-5">
            <div *ngFor="let course of courses"
                class="bg-white rounded-[20px] p-5 border border-gray-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] flex items-center gap-5 hover:shadow-md transition">
                <!-- Circular Progress Ring -->
                <div class="relative w-16 h-16 flex items-center justify-center shrink-0">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <path class="text-gray-100" stroke-width="3" stroke="currentColor" fill="none"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path [attr.stroke]="course.color" stroke-width="3" stroke-dasharray="100, 100"
                            [attr.stroke-dashoffset]="100 - course.progress" fill="none"
                            class="transition-all duration-1000 ease-out"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <span class="absolute text-[13px] font-bold text-gray-700">{{course.progress}}%</span>
                </div>

                <div>
                    <span class="text-[9px] text-gray-400 font-bold tracking-wider uppercase mb-1 block">PROGRESS</span>
                    <h4 class="text-[17px] font-bold text-gray-800">{{course.title}}</h4>
                    <p class="text-[13px] text-gray-500 mt-1 flex items-center gap-1.5 leading-snug">
                        <span class="w-3 h-3 rounded-full border-[3px] border-orange-400 shrink-0"></span>
                        <span class="line-clamp-1">{{course.subtitle}}</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

</div>
