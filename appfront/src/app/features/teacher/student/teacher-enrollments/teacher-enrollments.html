<div class="mx-auto max-w-7xl space-y-6 p-6">

    <div>
        <h1 class="text-3xl font-bold">Estudiantes inscritos</h1>
        <p class="text-gray-500">Visualiza todos los alumnos inscritos en tus cursos.</p>
    </div>

    <app-enrollment-filter (searchChange)="onSearch($event)" (statusChange)="onStatus($event)">
    </app-enrollment-filter>

    @if(loading){

    <div class="flex justify-center py-20">
        <span class="material-icons animate-spin text-5xl text-[#E8592B]">
            progress_activity
        </span>
    </div>

    }

    @if(!loading && filtered.length===0){

    <div class="rounded-2xl border bg-white p-20 text-center">

        <span class="material-icons text-6xl text-gray-300">
            school
        </span>

        <h2 class="mt-4 text-xl font-semibold">
            No hay estudiantes inscritos
        </h2>

    </div>

    }

    @if(!loading && filtered.length>0){

    <div class="grid gap-6 xl:grid-cols-[380px_1fr]">

        <div class="space-y-4 max-h-[80vh] overflow-y-auto pr-2">

            @for(item of filtered;track item.idEnrollment){

            <app-enrollment-card [enrollment]="item" [selected]="selectedEnrollment?.idEnrollment===item.idEnrollment"
                (selectedChange)="selectEnrollment(item)">
            </app-enrollment-card>

            }

        </div>

        <app-teacher-enrollment-detail [enrollment]="selectedEnrollment">
        </app-teacher-enrollment-detail>

    </div>

    }

</div>
