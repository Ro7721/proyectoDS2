<div class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm">

    <div class="grid gap-4 md:grid-cols-[1fr_220px]">

        <div class="relative">

            <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                search
            </span>

            <input type="text" [(ngModel)]="search" (input)="onSearch()" placeholder="Buscar estudiante o curso..."
                class="w-full rounded-xl border border-gray-300 py-3 pl-12 pr-4 outline-none transition focus:border-[#E8592B] focus:ring-2 focus:ring-[#E8592B]/20">

        </div>

        <select [(ngModel)]="status" (change)="onStatus()"
            class="rounded-xl border border-gray-300 bg-white px-4 py-3 outline-none transition focus:border-[#E8592B] focus:ring-2 focus:ring-[#E8592B]/20">

            <option value="ALL">Todos</option>
            <option value="PROGRESS">En progreso</option>
            <option value="COMPLETED">Completados</option>

        </select>

    </div>

</div>
