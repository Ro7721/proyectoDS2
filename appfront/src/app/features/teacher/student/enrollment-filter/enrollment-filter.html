<div class="rounded-2xl border border-gray-200 bg-white shadow-sm p-4">
    <div class="grid gap-3 md:grid-cols-[1fr_auto]">

        <!-- Search input -->
        <div class="relative">
            <span class="material-icons absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-[18px]">search</span>
            <input type="text" [(ngModel)]="search" (input)="onSearch()" placeholder="Buscar estudiante o curso..."
                class="w-full rounded-xl border border-gray-200 bg-gray-50 py-2.5 pl-10 pr-4 text-sm text-gray-700 placeholder-gray-400 outline-none transition focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30 focus:bg-white" />
        </div>

        <!-- Status filter buttons -->
        <div class="flex gap-2">
            <button *ngFor="let opt of statusOptions"
                (click)="setStatus(opt.value)"
                class="rounded-xl px-4 py-2.5 text-sm font-semibold border transition-all whitespace-nowrap"
                [class.bg-emerald-500]="status === opt.value"
                [class.text-white]="status === opt.value"
                [class.border-emerald-500]="status === opt.value"
                [class.bg-white]="status !== opt.value"
                [class.text-gray-600]="status !== opt.value"
                [class.border-gray-200]="status !== opt.value"
                [class.hover:border-emerald-500]="status !== opt.value">
                {{ opt.label }}
            </button>
        </div>

    </div>
</div>
