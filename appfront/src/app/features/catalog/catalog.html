<div class="flex flex-col min-h-screen">
    <app-header-catalog></app-header-catalog>
    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-8">

        <!-- Sidebar -->
        <aside
            class="w-full lg:w-64 flex-shrink-0 bg-white rounded-2xl p-5 shadow-sm border border-green-100 lg:sticky lg:top-20 self-start">
            <h4
                class="text-verde-oscuro font-semibold text-lg mb-4 flex items-center gap-2 border-b border-verde-fondo pb-3">
                <i class="pi pi-sliders-h"></i> Filtrar
            </h4>

            <div class="mb-5">
                <div class="font-semibold text-verde-oscuro text-sm mb-2"><i class="pi pi-categories"></i> Categorías
                </div>
                <div *ngFor="let cat of categories"
                    class="flex items-center gap-3 p-2 rounded-lg hover:bg-verde-fondo cursor-pointer">
                    <input type="checkbox" [value]="cat.idCategory" (change)="toggleCategory(cat.idCategory)"
                        class="accent-verde-claro w-4 h-4">
                    <label class="cursor-pointer text-gray-700 text-sm">{{ cat.name }}</label>
                </div>
            </div>

            <div class="mb-4">
                <div class="font-semibold text-verde-oscuro text-sm mb-2"><i class="pi pi-sort"></i> Ordenar por</div>
                <select (change)="onSortChange($event)"
                    class="w-full p-2 border border-green-200 rounded-lg outline-none focus:border-verde-claro bg-white text-sm cursor-pointer">
                    <option *ngFor="let option of optionSelected" [value]="option">{{ option }}</option>
                </select>
            </div>

            <button (click)="clearFilters()"
                class="w-full py-2 bg-verde-fondo hover:bg-green-200 text-verde-oscuro font-semibold rounded-lg transition">
                Limpiar filtros
            </button>
        </aside>

        <!-- Main Content -->
        <main class="flex-1">
            <div class="flex justify-between items-center mb-4 text-gray-600 text-sm">
                <span class="font-semibold text-verde-oscuro">{{ filteredCourses.length }}</span> cursos encontrados
            </div>

            <!-- Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div *ngFor="let course of filteredCourses"
                    class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition cursor-pointer border border-transparent hover:border-verde-claro/30"
                    (click)="openCourseDetail(course.idCourse)">

                    <div class="h-40 bg-gradient-to-r from-verde-claro to-green-300 relative">
                        <img [src]="course.coverImage" class="w-full h-full object-cover">
                    </div>

                    <div class="p-4">
                        <h3 class="font-bold text-gray-800 text-base leading-tight mb-1">{{ course.title }}</h3>
                        <div class="text-gray-500 text-xs mb-2"><i class="pi pi-user"></i> {{ course.teacherFullName }}
                        </div>
                        <div class="flex justify-between items-center pt-3 border-t border-gray-100">
                            <div class="font-bold text-verde-oscuro">
                                <span *ngIf="course.price" class="text-gray-400 text-sm line-through mr-2">S/.{{
                                    course.price }}</span>
                                @if (course.price >= 30) {
                                S/. {{ applyDiscount(course.price) }}
                                } @else {
                                <span>Gratis</span>
                                }
                            </div>
                            <button
                                class="bg-verde-claro hover:bg-verde-oscuro text-white px-4 py-1.5 rounded-md text-sm font-semibold transition"
                                (click)="$event.stopPropagation(); buyCourse(course.idCourse)">
                                <i class="pi pi-shopping-cart"></i> Comprar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- No results -->
            <div *ngIf="filteredCourses.length === 0" class="text-center py-12 bg-white rounded-xl">
                <i class="pi pi-search text-4xl text-gray-300 mb-3"></i>
                <p class="text-gray-500 text-lg">No hay cursos que coincidan con tu búsqueda.</p>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <app-course-modal [course]="selectedCourse" [visible]="modalVisible" (close)="closeModal()"
        (buy)="buyCourse($event)">
    </app-course-modal>

</div>
