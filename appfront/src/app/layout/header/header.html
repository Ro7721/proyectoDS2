<header class="bg-white border-b px-6 py-4 flex items-center justify-between sticky top-0 z-30">
    <div class="flex items-center gap-4">
        <p-button (click)="toggleSidebar()" [text]="true" severity="contrast" class="lg:hidden p-2 -ml-2">
            <i class="pi pi-bars"></i>
        </p-button>
        <h1 class="text-xl font-semibold text-gray-900">{{ title }}</h1>
    </div>

    <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 hover:cursor-pointer hover:bg-gray-100 rounded-xl p-2">
            <div class="w-9 h-9 rounded-full bg-[#3A9E5F] text-white grid place-items-center font-medium">
                {{ initials }}
            </div>
            <span class="hidden sm:block text-sm text-gray-600">{{ userName }}</span>
        </div>
    </div>
</header>
