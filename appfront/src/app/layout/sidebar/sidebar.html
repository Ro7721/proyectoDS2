<aside class="w-64 bg-white border-r h-screen sticky top-0 hidden lg:flex flex-col">
    <div class="p-6">
        <div class="flex items-center gap-2 mb-10">
            <span class="text-2xl font-bold text-[#3A9E5F]">EduLearn</span>
            <span class="text-[11px] px-2 py-0.5 rounded-full font-medium"
                [class]="role === 'TEACHER'? 'bg-purple-100 text-purple-700' : 'bg-green-100 text-green-700'">
                {{ role === 'TEACHER'? 'Docente' : 'Alumno' }}
            </span>
        </div>

        <nav class="space-y-1">
            <a *ngFor="let item of menu" [routerLink]="item['route']" routerLinkActive="bg-[#3A9E5F]/10 text-[#3A9E5F]"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition font-medium">
                <i *ngIf="item.icon" [class]="item.icon"></i>
                <span>{{ item.label }}</span>
            </a>
        </nav>
    </div>

    <div class="mt-auto p-6 border-t">
        <button
            class="w-full text-left text-sm text-gray-600 hover:text-red-600 bg-transparent hover:bg-red-50 hover:text-red-600 rounded-xl p-3 flex justify-between">
            Cerrar sesión
            <i class="pi pi-sign-out"></i>
        </button>
    </div>
</aside>
